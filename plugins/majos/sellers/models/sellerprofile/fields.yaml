# ===================================
#  Form Field Definitions for SellerProfile
# ===================================

fields:
    user_id:
        label: User
        type: relation
        required: true
        span: auto
    tenant_id:
        label: Tenant
        type: relation
        nameFrom: name
        span: auto
    company_name:
        label: Company Name
        span: auto
    phone_number:
        label: Phone Number
        span: auto
    address:
        label: Address
        type: textarea
        span: full
    identification_type:
        label: ID Type
        type: dropdown
        options:
            national_id: National ID
            passport: Passport
            dl: Driving License
        span: auto
    identification_number:
        label: ID Number
        span: auto
    tax_id:
        label: Tax ID
        span: auto
    is_seller:
        label: Is Seller
        type: switch
        span: auto
    is_verified_seller:
        label: Verified Seller
        type: switch
        span: auto
    division_id:
        label: Location (Division)
        type: dropdown
        span: auto
        dependsOn:
            - tenant_id
        emptyOption: -- Select Tenant First --