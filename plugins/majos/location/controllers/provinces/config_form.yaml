# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Province

# Model Form Field configuration
form: $/majos/location/models/province/fields.yaml

# Model Class name
modelClass: Majos\Location\Models\Province

# Default redirect location
defaultRedirect: majos/location/provinces

# Create page
create:
    title: backend::lang.form.create_title
    redirect: majos/location/provinces/update/:id
    redirectClose: majos/location/provinces

# Update page
update:
    title: backend::lang.form.update_title
    redirect: majos/location/provinces
    redirectClose: majos/location/provinces

# Preview page
preview:
    title: backend::lang.form.preview_title
