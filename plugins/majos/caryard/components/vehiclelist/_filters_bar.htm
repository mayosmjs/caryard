<form id="vehicle-filter-bar-form" data-request="{{ __SELF__ }}::onFilter"
    data-request-update="'{{ __SELF__ }}::_list': '#vehicle-list'" data-request-loading="#filtering-loader"
    data-request-progress-bar="true"
    class="bg-white border border-slate-200 shadow-2xl p-2 grid grid-cols-1 md:grid-cols-4 items-center mb-6">
    <!-- Brand -->
    <div class="px-6 py-4 border-r border-slate-100">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Make / Model</label>
        <select name="brand"
            class="w-full bg-transparent font-bold text-slate-800 outline-none appearance-none cursor-pointer">
            <option value="">All Vehicles</option>
            {% for brand in filterOptions.brands %}
            <option value="{{ brand.slug }}" {{ component.selected('brandSlug', brand.slug) }}>{{ brand.name }}</option>
            {% endfor %}
        </select>
    </div>
    <!-- Price Range -->
    <div class="px-6 py-4 border-r border-slate-100">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Price Range</label>
        <select name="price_max"
            class="w-full bg-transparent font-bold text-slate-800 outline-none appearance-none cursor-pointer">
            <option value="">Any Price</option>
            <option value="100000" {{ component.selected('maxPrice', '100000' ) }}>Under {{
                tenant.currency|default('GH₵') }} 100K</option>
            <option value="300000" {{ component.selected('maxPrice', '300000' ) }}>Under {{
                tenant.currency|default('GH₵') }} 300K</option>
            <option value="500000" {{ component.selected('maxPrice', '500000' ) }}>Under {{
                tenant.currency|default('GH₵') }} 500K</option>
        </select>
    </div>
    <!-- Location -->
    <div class="px-6 py-4 border-r border-slate-100">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Location</label>
        <input type="text" name="search" placeholder="Search..."
            class="w-full bg-transparent font-bold text-slate-800 outline-none placeholder:text-slate-300"
            value="{{ component.searchTerm }}" />
    </div>
    <!-- Actions -->
    <div class="flex h-full">
        <button type="submit"
            class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-900 font-black uppercase tracking-widest text-xs py-6 transition">
            Find Availability
        </button>
        <button type="button" data-bs-toggle="modal" data-bs-target="#advancedSearchModal"
            class="px-4 bg-slate-900 text-white hover:bg-slate-800 transition">
            <i class="fas fa-sliders-h"></i>
        </button>
    </div>
</form>
