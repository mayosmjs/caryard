<div class="container mx-auto px-6 py-12">

    <!-- Compact Filter Bar (main view) -->
    <div class="mb-12">
        {% partial __SELF__ ~ '::_filters_bar' %}
    </div>

    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-12">
                <div>
                    <h2 class="text-3xl font-black text-gray-900 md:text-4xl">
                        Vehicles {% if tenant %}in {{ tenant.name }}{% endif %}
                    </h2>
                    <div class="mt-2 h-1.5 w-12 rounded-full bg-yellow-400"></div>
                </div>
                <div class="text-muted small font-bold uppercase tracking-widest">
                    <span id="vehicle-count">{{ results.total }}</span> listings found
                </div>
            </div>

            <div id="vehicle-list">
                {% partial __SELF__ ~ '::_list' %}
            </div>
        </div>
    </div>

</div>

<!-- ═══ Advanced Search Drawer (left slide-in) ═══ -->
<div id="filterDrawerBackdrop"
     class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[9998] hidden transition-opacity duration-300 opacity-0"
     onclick="closeFilterDrawer()"></div>

<aside id="filterDrawer"
       class="fixed top-0 left-0 h-full w-full max-w-md bg-white z-[9999] shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto">

    <!-- Drawer Header -->
    <div class="sticky top-0 bg-slate-900 text-white px-6 py-4 flex items-center justify-between z-10">
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-5 bg-amber-500"></div>
            <h5 class="font-black uppercase tracking-widest text-sm m-0">Advanced Search</h5>
        </div>
        <button type="button" onclick="closeFilterDrawer()"
                class="text-white/60 hover:text-white transition text-xl leading-none">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Drawer Body -->
    <div class="p-0">
        {% partial __SELF__ ~ '::_filters' %}
    </div>
</aside>

<script>
function openFilterDrawer() {
    var drawer = document.getElementById('filterDrawer');
    var backdrop = document.getElementById('filterDrawerBackdrop');
    if (drawer) {
        backdrop.classList.remove('hidden');
        setTimeout(function() {
            backdrop.classList.remove('opacity-0');
            backdrop.classList.add('opacity-100');
            drawer.classList.remove('-translate-x-full');
            drawer.classList.add('translate-x-0');
        }, 10);
        document.body.style.overflow = 'hidden';
    }
}
function closeFilterDrawer() {
    var drawer = document.getElementById('filterDrawer');
    var backdrop = document.getElementById('filterDrawerBackdrop');
    if (drawer) {
        drawer.classList.remove('translate-x-0');
        drawer.classList.add('-translate-x-full');
        backdrop.classList.remove('opacity-100');
        backdrop.classList.add('opacity-0');
        setTimeout(function() { 
            backdrop.classList.add('hidden'); 
            
            // Auto scroll to results count
            const target = document.getElementById('vehicle-count');
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 300);
        document.body.style.overflow = '';
    }
}
// Close drawer on ESC key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeFilterDrawer();
});
</script>

<style>
    .rounded-lg {
        border-radius: 12px;
    }

    .btn-premium {
        background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
        color: white;
        border: none;
        padding: 10px 20px;
        transition: transform 0.2s;
    }

    .btn-premium:hover {
        transform: translateY(-2px);
        color: #f8f9fa;
    }

    .form-label {
        font-weight: 600;
        font-size: 0.9rem;
        color: #444;
    }

    .form-select,
    .form-control {
        border-radius: 8px;
        border: 1px solid #eee;
        padding: 10px;
    }

    .form-select:focus,
    .form-control:focus {
        border-color: #000;
        box-shadow: none;
    }
</style>
