<!-- Results grid -->
<div id="vehicle-cards-inner" class="row g-4">
    {% partial __SELF__ ~ '::_cards' %}
</div>

<!-- Empty state -->
{% if not results.count %}
<div class="col-12 py-5 text-center">
    <i class="fas fa-search fa-3x mb-3" style="opacity:0.12;"></i>
    <h3 class="h5 text-muted">No vehicles match your criteria.</h3>
    <p class="text-muted small">Try adjusting or resetting your filters.</p>
</div>
{% endif %}

{% if results.hasMorePages %}
<div class="text-center mt-4" id="load-more-wrap">
    <button id="load-more-btn" class="btn btn-outline-dark px-5" data-next-page="{{ results.currentPage + 1 }}"
        data-has-more="{{ results.hasMorePages ? 'true' : 'false' }}">
        <span class="load-more-text">Load More</span>
        <span class="load-more-spinner spinner-border spinner-border-sm ms-2" style="display:none;"
            role="status"></span>
    </button>
</div>
{% endif %}

<!-- Hidden page tracker (written by JS, read by AJAX form submits) -->
<input type="hidden" id="current-page-tracker" value="{{ results.currentPage }}">

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Update count badge
        var countEl = document.getElementById('vehicle-count');
        if (countEl) countEl.innerText = '{{ results.total }}';

        // ── Pagination: inject chosen page into filter form before submit ──
        document.querySelectorAll('.page-nav').forEach(function (el) {
            el.addEventListener('click', function () {
                var page = this.getAttribute('data-page');
                var form = document.getElementById('vehicle-filter-bar-form');
                if (!form) return;
                var pageInput = form.querySelector('[name="page"]');
                if (!pageInput) {
                    pageInput = document.createElement('input');
                    pageInput.type = 'hidden';
                    pageInput.name = 'page';
                    form.appendChild(pageInput);
                }
                pageInput.value = page;
                updateUrl(page);
            });
        });

        // ── Load More ──────────────────────────────────────────────────────
        var loadMoreBtn = document.getElementById('load-more-btn');
        if (loadMoreBtn) {
            loadMoreBtn.addEventListener('click', function () {
                var btn = this;
                var nextPage = parseInt(btn.getAttribute('data-next-page'));
                var form = document.getElementById('vehicle-filter-bar-form');

                btn.querySelector('.load-more-text').style.opacity = '0.5';
                btn.querySelector('.load-more-spinner').style.display = '';
                btn.disabled = true;

                // Collect filter data from the form using vanilla JS
                var formData = {};
                if (form) {
                    var inputs = form.querySelectorAll('input[name], select[name]');
                    inputs.forEach(function (el) {
                        if ((el.type === 'checkbox' || el.type === 'radio') && !el.checked) return;
                        if (el.name && el.value) formData[el.name] = el.value;
                    });
                }
                formData.page = nextPage;

                // Use October's oc.request via the framework's global $.request
                // Wrapped in a check to ensure jQuery + framework are loaded
                if (typeof oc !== 'undefined' && oc.request) {
                    oc.request(document.body, '{{ __SELF__ }}::onLoadMore', {
                        data: formData,
                        success: function (data) {
                            handleLoadMoreResponse(data, btn, nextPage);
                        },
                        error: function () {
                            resetLoadMoreBtn(btn);
                        }
                    });
                } else if (typeof $ !== 'undefined' && $.request) {
                    $.request('{{ __SELF__ }}::onLoadMore', {
                        data: formData,
                        success: function (data) {
                            handleLoadMoreResponse(data, btn, nextPage);
                        },
                        error: function () {
                            resetLoadMoreBtn(btn);
                        }
                    });
                } else {
                    // Fallback: plain AJAX with October headers
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', window.location.href, true);
                    xhr.setRequestHeader('X-OCTOBER-REQUEST-HANDLER', '{{ __SELF__ }}::onLoadMore');
                    xhr.setRequestHeader('X-OCTOBER-REQUEST-PARTIALS', '');
                    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
                    xhr.setRequestHeader('Content-Type', 'application/json');

                    var tokenMeta = document.querySelector('meta[name="csrf-token"]');
                    if (tokenMeta) {
                        xhr.setRequestHeader('X-CSRF-TOKEN', tokenMeta.getAttribute('content'));
                    }

                    xhr.onload = function () {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                var data = JSON.parse(xhr.responseText);
                                handleLoadMoreResponse(data, btn, nextPage);
                            } catch (e) {
                                resetLoadMoreBtn(btn);
                            }
                        } else {
                            resetLoadMoreBtn(btn);
                        }
                    };
                    xhr.onerror = function () { resetLoadMoreBtn(btn); };
                    xhr.send(JSON.stringify(formData));
                }
            });
        }

        function handleLoadMoreResponse(data, btn, nextPage) {
            // Append new cards HTML
            var html = data['#vehicle-cards-inner'] || '';
            if (html) {
                var grid = document.getElementById('vehicle-cards-inner');
                if (grid) {
                    var temp = document.createElement('div');
                    temp.innerHTML = html;
                    while (temp.firstChild) {
                        grid.appendChild(temp.firstChild);
                    }
                }
            }

            if (data.hasMore) {
                btn.setAttribute('data-next-page', data.nextPage);
                resetLoadMoreBtn(btn);
            } else {
                var wrap = document.getElementById('load-more-wrap');
                if (wrap) wrap.remove();
            }

            var countEl = document.getElementById('vehicle-count');
            if (countEl && data.total) countEl.innerText = data.total;

            updateUrl(nextPage);
        }

        function resetLoadMoreBtn(btn) {
            if (!btn) return;
            var text = btn.querySelector('.load-more-text');
            var spinner = btn.querySelector('.load-more-spinner');
            if (text) text.style.opacity = '';
            if (spinner) spinner.style.display = 'none';
            btn.disabled = false;
        }

        // ── URL Sync ───────────────────────────────────────────────────────
        function updateUrl(page) {
            var form = document.getElementById('vehicle-filter-bar-form');
            var params = new URLSearchParams();

            if (form) {
                var inputs = form.querySelectorAll('input[name], select[name]');
                inputs.forEach(function (el) {
                    if ((el.type === 'checkbox' || el.type === 'radio') && !el.checked) return;
                    if (el.name && el.value) params.append(el.name, el.value);
                });
            }

            if (page && page > 1) params.set('page', page);

            var qs = params.toString();
            var url = window.location.pathname + (qs ? '?' + qs : '');
            history.pushState({ page: page, qs: qs }, '', url);
        }
    });
</script>

<style>
    .pagination-premium .page-link {
        border: none;
        color: #555;
        margin: 0 3px;
        border-radius: 8px !important;
        font-weight: 600;
        padding: 8px 15px;
        transition: background 0.15s;
    }

    .pagination-premium .page-item.active .page-link {
        background: #111;
        color: #fff;
    }

    .pagination-premium .page-link:hover {
        background: #f0f0f0;
        color: #000;
    }

    #load-more-btn {
        border-radius: 50px;
        font-weight: 600;
        letter-spacing: 0.3px;
    }
</style>
