<style>
#vehicle-filter-form .form-label {
    margin-bottom: 0.5rem !important;
    display: block !important;
    font-size: 0.65rem !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
    color: #475569 !important;
}
#vehicle-filter-form .filter-input {
    width: 100% !important;
    border-radius: 0 !important;
    border: 2px solid #e2e8f0 !important;
    background-color: #fff !important;
    padding: 0.65rem 0.75rem !important;
    font-size: 0.8rem !important;
    font-weight: 700 !important;
    color: #0f172a !important;
    outline: none !important;
    transition: all 0.15s ease !important;
}
#vehicle-filter-form .filter-input:focus {
    border-color: #f59e0b !important;
    box-shadow: 3px 3px 0px 0px rgba(15,23,42,0.15) !important;
}
#vehicle-filter-form .section-header {
    border-bottom: 3px solid #0f172a;
    padding-bottom: 0.4rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
#vehicle-filter-form .section-header h3 {
    font-size: 0.7rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #0f172a;
    margin: 0;
}

</style>

<form id="vehicle-filter-form"
      data-request="{{ __SELF__ }}::onFilter"
      data-request-update="'{{ __SELF__ }}::_list': '#vehicle-list'"
      data-request-loading="#filtering-loader"
      class="flex flex-col h-full">

    <input type="hidden" name="page" value="1" id="form-page-input">

    <div class="flex-1 overflow-y-auto space-y-8 p-6">

        <!-- 1. Vehicle Selection -->
        <section>
            <div class="section-header">
                <div class="w-1.5 h-4 bg-amber-500"></div>
                <h3>Vehicle Selection</h3>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="form-label">Search Keywords</label>
                    <input type="text" name="search" placeholder="e.g. BMW M4"
                           value="{{ component.searchTerm }}" class="filter-input">
                </div>

                <!-- Brand & Model grouped selector -->
                <div class="rounded-lg border border-slate-200 bg-slate-50 p-4 space-y-4">
                    <!-- Brand -->
                    <div>
                        <label class="form-label">Make / Brand</label>
                        <select name="brand" id="filterBrand" class="filter-input uppercase">
                            <option value="">-- Select Brand --</option>
                            {% for b in filterOptions.brands %}
                                <option value="{{ attribute(b, 'slug') }}" {% if component.brandSlug == attribute(b, 'slug') %}selected{% endif %}>{{ attribute(b, 'name') }}</option>
                            {% endfor %}
                        </select>
                        <p class="text-[9px] font-bold text-slate-400 mt-1.5 uppercase tracking-tighter italic">Select the vehicle manufacturer.</p>
                    </div>

                    <!-- Model -->
                    <div>
                        <label class="form-label">Model / Series</label>
                        <select name="model" id="filterModel" class="filter-input uppercase">
                            <option value="">-- Select Model --</option>
                            {% if component.brandSlug and filterOptions.models %}
                                {% for m in filterOptions.models %}
                                    <option value="{{ attribute(m, 'slug') }}" {% if component.modelSlug == attribute(m, 'slug') %}selected{% endif %}>{{ attribute(m, 'name') }}</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                        <p class="text-[9px] font-bold text-slate-400 mt-1.5 uppercase tracking-tighter italic">Pick a brand first to see models.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. Technical Profile -->
        <section>
            <div class="section-header">
                <div class="w-1.5 h-4 bg-amber-500"></div>
                <h3>Technical Profile</h3>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="form-label">Price Range ({{ tenant.currency|default('USD') }})</label>
                    <div class="flex gap-2">
                        <input type="number" name="price_min" placeholder="MIN"
                               value="{{ component.minPrice }}" class="filter-input">
                        <input type="number" name="price_max" placeholder="MAX"
                               value="{{ component.maxPrice }}" class="filter-input">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="form-label">Condition</label>
                        <select name="condition" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for c in filterOptions.conditions %}
                                <option value="{{ c.slug }}" {{ component.selected('conditionSlug', c.slug) }}>{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Body Type</label>
                        <select name="body_type" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for b in filterOptions.bodyTypes %}
                                <option value="{{ b.slug }}" {{ component.selected('bodyTypeSlug', b.slug) }}>{{ b.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="form-label">Transmission</label>
                        <select name="transmission" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for t in filterOptions.transmissions %}
                                <option value="{{ t.slug }}" {{ component.selected('transmissionSlug', t.slug) }}>{{ t.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Fuel Type</label>
                        <select name="fuel_type" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for f in filterOptions.fuelTypes %}
                                <option value="{{ f.slug }}" {{ component.selected('fuelTypeSlug', f.slug) }}>{{ f.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="form-label">Color</label>
                        <select name="color" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for c in filterOptions.colors %}
                                <option value="{{ c.slug }}" {{ component.selected('colorSlug', c.slug) }}>{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Drive Type</label>
                        <select name="drive_type" class="filter-input uppercase">
                            <option value="">Any</option>
                            {% for d in filterOptions.driveTypes %}
                                <option value="{{ d.slug }}" {{ component.selected('driveTypeSlug', d.slug) }}>{{ d.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="form-label">Year Range</label>
                    <div class="flex gap-2">
                        <input type="number" name="year_min" placeholder="FROM" min="1990" max="2030"
                               value="{{ component.yearMin }}" class="filter-input">
                        <input type="number" name="year_max" placeholder="TO" min="1990" max="2030"
                               value="{{ component.yearMax }}" class="filter-input">
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. Location -->
        <section>
            <div class="section-header">
                <div class="w-1.5 h-4 bg-amber-500"></div>
                <h3>Location</h3>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="form-label">Region / County</label>
                    <select name="division" id="filterDivision" class="filter-input uppercase">
                        <option value="">All Areas</option>
                        {% for d in filterOptions.divisions %}
                            <option value="{{ d.slug }}" {{ component.selected('divisionSlug', d.slug) }}>{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label">City / Town</label>
                    <select name="sub_division" id="filterSubDivision" class="filter-input uppercase">
                        <option value="">All</option>
                    </select>
                    <p class="text-[9px] text-slate-400 mt-1 italic font-medium">Select a region first</p>
                </div>
            </div>
        </section>

    </div>

    <!-- Sticky Footer Actions -->
    <div class="sticky bottom-0 bg-white border-t-4 border-slate-900 p-4 flex gap-3">
        <button type="button" id="resetBtn"
                class="flex-1 h-12 border-2 border-slate-900 font-black uppercase text-[10px] tracking-widest hover:bg-slate-900 hover:text-white transition-all">
            Reset
        </button>
        <button type="submit"
                class="flex-[2] h-12 bg-amber-500 border-2 border-slate-900 font-black uppercase text-xs tracking-widest hover:bg-amber-600 active:translate-x-0.5 active:translate-y-0.5 transition-all">
            Apply Filters
        </button>
    </div>

    <div id="filtering-loader" class="hidden fixed top-0 left-0 w-full h-1 bg-amber-500 z-[99999] animate-pulse"></div>
</form>

{% put scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof $ === 'undefined' || typeof $.fn === 'undefined') return;
    var $form = $('#vehicle-filter-form');
    if (!$form.length) return;


    var brandModelsMap = {};
    {% for b in filterOptions.brands %}
        {% set bSlug = attribute(b, 'slug') %}
        {% set bModels = attribute(b, 'vehicle_models') is defined ? attribute(b, 'vehicle_models') : (attribute(b, 'models') is defined ? attribute(b, 'models') : null) %}
        {% if bModels is iterable and bModels|length > 0 %}
            brandModelsMap["{{ bSlug }}"] = [
                {% for m in bModels %}
                    { slug: "{{ attribute(m, 'slug') }}", name: "{{ attribute(m, 'name')|e('js') }}" }{{ not loop.last ? ',' }}
                {% endfor %}
            ];
        {% endif %}
    {% endfor %}

    console.log('brandModelsMap built from Twig:', brandModelsMap);

    var brandSel = document.getElementById('filterBrand');
    var modelSel = document.getElementById('filterModel');

    function populateModels(models, selectedSlug) {
        modelSel.innerHTML = '<option value="">-- Select Model --</option>';
        if (!models) return;
        for (var i = 0; i < models.length; i++) {
            var opt = document.createElement('option');
            opt.value = models[i].slug;
            opt.textContent = models[i].name;
            if (selectedSlug && models[i].slug === selectedSlug) opt.selected = true;
            modelSel.appendChild(opt);
        }
    }

    if (brandSel && modelSel) {
        brandSel.addEventListener('change', function() {
            var slug = this.value;
            modelSel.innerHTML = '<option value="">-- Select Model --</option>';

            if (!slug) return;

            // Use client-side map if available
            if (brandModelsMap[slug] && brandModelsMap[slug].length > 0) {
                populateModels(brandModelsMap[slug]);
                return;
            }

            // AJAX fallback — submit brand to onFilter and read the returned models partial
            $.request('{{ __SELF__ }}::onGetModelsForBrand', {
                data: { brand_slug: slug },
                success: function(data) {
                    if (data.results && data.results.length > 0) {
                        populateModels(data.results);
                    }
                },
                error: function() {
                    console.log('onGetModelsForBrand not available, models may not load dynamically.');
                }
            });
        });

        // On page load, if brand is selected but model list is empty, trigger change
        if (brandSel.value && modelSel.options.length <= 1) {
            var preselectedModel = '{{ component.modelSlug }}';
            var clientModels = brandModelsMap[brandSel.value];
            if (clientModels && clientModels.length > 0) {
                populateModels(clientModels, preselectedModel);
            } else {
                brandSel.dispatchEvent(new Event('change'));
                {% if component.modelSlug %}
                    setTimeout(function() {
                        modelSel.value = '{{ component.modelSlug }}';
                    }, 300);
                {% endif %}
            }
        }
    }

    /* ── Division → Sub-division cascade ─────── */
    var divSel = document.getElementById('filterDivision');
    var subSel = document.getElementById('filterSubDivision');

    function loadSubDivisions(parentSlug, selectedSlug) {
        if (!parentSlug || !subSel) return;
        $.request('{{ __SELF__ }}::onGetChildDivisions', {
            data: { parent_slug: parentSlug },
            success: function(data) {
                if (data.html) {
                    subSel.innerHTML = data.html;
                    if (selectedSlug) {
                        $(subSel).val(selectedSlug);
                    }
                }
            }
        });
    }

    if (divSel && subSel) {
        divSel.addEventListener('change', function() {
            subSel.innerHTML = '<option value="">All</option>';
            loadSubDivisions(this.value);
        });

        // Pre-populate on page load if a division is already selected
        if (divSel.value) {
            loadSubDivisions(divSel.value, '{{ component.divisionSlug }}');
        }
    }

    /* ── Close drawer on submit success ──────── */
    $form.on('ajaxSuccess', function() {
        if (typeof closeFilterDrawer === 'function') closeFilterDrawer();
        var qs = $form.serialize();
        history.pushState(null, '', window.location.pathname + (qs ? '?' + qs : ''));
    });

    /* ── Reset ───────────────────────────────── */
    $('#resetBtn').on('click', function(e) {
        e.preventDefault();

        // Reset native inputs
        $form[0].reset();

        // Clear all text/number inputs
        $form.find('input[type="text"], input[type="number"]').val('');

        // Reset all native selects to first option
        $form.find('select').each(function() {
            this.selectedIndex = 0;
        });

        // Reset sub-division
        if (subSel) subSel.innerHTML = '<option value="">All</option>';

        // Reset hidden page input
        $('#form-page-input').val('1');

        // Submit via October AJAX
        $form.request('{{ __SELF__ }}::onFilter', {
            update: { '{{ __SELF__ }}::_list': '#vehicle-list' }
        });

        // Close drawer
        if (typeof closeFilterDrawer === 'function') closeFilterDrawer();

        // Clean URL
        history.pushState(null, '', window.location.pathname);
    });
});
</script>
{% endput %}
