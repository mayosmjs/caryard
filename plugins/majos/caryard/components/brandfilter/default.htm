{% if brands|length > 0 %}
<div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
  {% for brand in brands %}
  <a href="{{ 'buy'|page({ brand: brand.slug }) }}"
    class="group flex flex-col items-center justify-center p-2 sm:p-3 rounded-lg border border-gray-200 hover:border-orange-400 hover:shadow-md transition-all duration-300 bg-white h-full">
    {% if brand.logo_file %}
    <img src="{{ brand.logo_file.getPath }}" alt="{{ brand.name }}" class="w-10 h-10 sm:w-12 sm:h-12 object-contain mb-1" />
    {% else %}
    <span class="text-lg sm:text-xl font-bold text-gray-600">{{ brand.name|slice(0,1) }}</span>
    {% endif %}
    <span class="text-xs font-medium text-gray-600 group-hover:text-gray-900">{{ brand.name }}</span>
  </a>
  {% endfor %}
</div>
{% endif %}
