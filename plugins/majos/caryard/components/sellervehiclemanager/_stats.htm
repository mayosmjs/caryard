{% set stats = __SELF__.getStats() %}
<div class="grid grid-cols-2 lg:grid-cols-3 gap-2 md:gap-4">
    <!-- Total -->
    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm group">
        <div class="flex items-center justify-between mb-2">
            <div class="w-8 h-8 bg-slate-50 text-slate-400 rounded-lg flex items-center justify-center border border-slate-100 group-hover:bg-slate-900 group-hover:text-white transition-colors">
                <i class="fas fa-boxes-stacked text-[11px]"></i>
            </div>
            <span class="text-[7px] font-black text-slate-300 uppercase tracking-widest">Total</span>
        </div>
        <div class="text-xl font-black text-slate-900 leading-none">{{ stats.total|default(0) }}</div>
        <div class="text-[7px] font-black text-slate-400 uppercase tracking-widest mt-1">Vehicles</div>
    </div>

    <!-- Active -->
    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm group">
        <div class="flex items-center justify-between mb-2">
            <div class="w-8 h-8 bg-green-50 text-green-600 rounded-lg flex items-center justify-center border border-green-100 group-hover:bg-green-600 group-hover:text-white transition-colors">
                <i class="fas fa-check-circle text-[11px]"></i>
            </div>
            <span class="text-[7px] font-black text-slate-300 uppercase tracking-widest">Active</span>
        </div>
        <div class="text-xl font-black text-slate-900 leading-none">{{ stats.active|default(0) }}</div>
        <div class="text-[7px] font-black text-slate-400 uppercase tracking-widest mt-1">Live Listings</div>
    </div>

    <!-- Inactive -->
    <div class="bg-white border border-slate-200 p-3 rounded-2xl shadow-sm group">
        <div class="flex items-center justify-between mb-2">
            <div class="w-8 h-8 bg-amber-50 text-amber-500 rounded-lg flex items-center justify-center border border-amber-100 group-hover:bg-amber-500 group-hover:text-slate-900 transition-colors">
                <i class="fas fa-pause-circle text-[11px]"></i>
            </div>
            <span class="text-[7px] font-black text-slate-300 uppercase tracking-widest">Inactive</span>
        </div>
        <div class="text-xl font-black text-slate-900 leading-none">{{ stats.inactive|default(0) }}</div>
        <div class="text-[7px] font-black text-slate-400 uppercase tracking-widest mt-1">Draft/Paused</div>
    </div>
</div>
