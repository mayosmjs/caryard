<div class="fixed inset-0 z-[1001] flex flex-col sm:items-center sm:justify-center overflow-hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    
    <!-- BACKDROP -->
    <div class="hidden sm:block absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" aria-hidden="true" 
         onclick="document.getElementById('loan-settings-modal-container').innerHTML = '';"></div>

    <!-- MODERN SHELL -->
    <div class="relative w-full h-full sm:h-auto sm:max-h-[85vh] sm:max-w-xl bg-white sm:border sm:border-slate-200 sm:rounded-3xl sm:shadow-2xl flex flex-col overflow-hidden z-10">

        <form id="loan-settings-form"
            data-request="{{ __SELF__ }}::onSaveLoanSettings"
            data-request-validate
            data-request-flash
            class="flex flex-col h-full">

            <!-- STICKY MODERN HEADER -->
            <div class="sticky top-0 z-50 bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-black text-slate-900 uppercase tracking-tighter">
                        Loan <span class="text-amber-500">Settings</span>
                    </h3>
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1 italic">Financial Configuration Module</p>
                </div>
                <button type="button" 
                        class="w-8 h-8 bg-slate-50 text-slate-400 rounded-lg hover:bg-slate-100 transition-all flex items-center justify-center border border-slate-100"
                        onclick="document.getElementById('loan-settings-modal-container').innerHTML = '';">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>

            <!-- SCROLLABLE CONTENT (MODERN) -->
            <div class="flex-1 overflow-y-auto bg-slate-50/20 px-6 py-6 space-y-6">

                <!-- DEPLOY TOGGLE (MODERN) -->
                <div class="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <div class="flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                        <span class="text-[9px] font-black text-slate-900 uppercase tracking-widest">Calculations Module</span>
                    </div>

                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="loan_enabled" value="1"
                            class="sr-only peer"
                            {{ loanSettings.loan_enabled ? 'checked' : '' }}>
                        <div class="w-10 h-6 bg-slate-200 rounded-full peer peer-checked:bg-amber-500 after:content-[''] after:absolute after:top-[3px] after:left-[3px] after:bg-white after:rounded-full after:h-[18px] after:w-[18px] after:transition-all peer-checked:after:translate-x-4"></div>
                    </label>
                </div>

                <!-- TERMS -->
                <section class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <h5 class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-4">Duration Selection (Months)</h5>
                    <div class="grid grid-cols-4 xs:grid-cols-6 gap-2">
                        {% for term in [3, 6, 12, 18, 24, 36, 48, 60, 72, 84, 96] %}
                        <label class="relative cursor-pointer group">
                            <input type="checkbox" name="loan_terms[]" value="{{ term }}" class="sr-only peer" {{ term in loanSettings.loan_terms ? 'checked' : '' }}>
                            <div class="flex items-center justify-center py-2 rounded-lg border border-slate-100 bg-slate-50 text-[11px] font-black text-slate-400 peer-checked:bg-amber-500 peer-checked:text-slate-900 peer-checked:border-slate-900 transition-all">
                                {{ term }}
                            </div>
                        </label>
                        {% endfor %}
                    </div>
                </section>

                <!-- INPUTS -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div class="bg-white p-4 border border-slate-100 rounded-xl shadow-sm">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Annual Rate %</label>
                        <input type="number" name="loan_annual_rate" value="{{ loanSettings.loan_annual_rate }}" step="0.1" class="w-full text-base font-black text-slate-900 focus:outline-none">
                    </div>
                    <div class="bg-white p-4 border border-slate-100 rounded-xl shadow-sm">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Min Dep %</label>
                        <input type="number" name="loan_min_down_payment_percent" value="{{ loanSettings.loan_min_down_payment_percent }}" class="w-full text-base font-black text-slate-900 focus:outline-none">
                    </div>
                    <div class="bg-white p-4 border border-slate-100 rounded-xl shadow-sm">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Max Dep %</label>
                        <input type="number" name="loan_max_down_payment_percent" value="{{ loanSettings.loan_max_down_payment_percent }}" class="w-full text-base font-black text-slate-900 focus:outline-none">
                    </div>
                </div>

                <!-- VALIDATION LOG -->
                <div id="loan-settings-validation" class="hidden p-3 bg-red-50 border border-red-100 rounded-xl flex items-center gap-2">
                    <i class="fas fa-exclamation-circle text-red-500 text-[10px]"></i>
                    <p class="text-[9px] font-black text-red-600 uppercase tracking-tight" id="loan-settings-error"></p>
                </div>
            </div>

            <!-- MODAL ACTION BAR -->
            <div class="sticky bottom-0 bg-white border-t border-slate-100 px-6 py-4 flex items-center justify-end gap-2">
                <button type="button" 
                        class="flex-1 sm:flex-none px-6 py-2.5 bg-white border border-slate-200 text-[9px] font-black text-slate-400 uppercase rounded-xl hover:text-slate-900 hover:border-slate-900 transition-all"
                        onclick="document.getElementById('loan-settings-modal-container').innerHTML = '';">
                    Cancel
                </button>
                <button type="submit" 
                        class="flex-1 sm:flex-none px-8 py-2.5 bg-amber-500 text-[9px] font-black text-slate-900 uppercase rounded-xl shadow-md hover:bg-amber-400 transition-all" 
                        data-attach-loading>
                    Commit Settings
                </button>
            </div>
        </form>
    </div>
</div>
