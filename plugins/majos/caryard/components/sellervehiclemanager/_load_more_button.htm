{% if hasMore %}
<div class="flex justify-center mt-8">
    <button data-request="{{ __SELF__ }}::onLoadMore"
        data-request-data="page: {{ currentPage + 1 }}, filter: {{ filters|json_encode }}"
        data-request-loading="#load-more-loader"
        class="px-5 py-2.5 bg-slate-900 border-[1.5px] border-slate-900 text-[8px] font-black text-white uppercase tracking-widest rounded-xl shadow-md hover:bg-slate-800 transition-all flex items-center gap-2">
        <i class="fas fa-chevron-down text-[7px] text-amber-500"></i>
        Load More
    </button>
</div>
{% else %}
{% if currentPage > 1 %}
<div class="text-center py-6">
    <span class="text-[8px] font-black text-slate-300 uppercase tracking-[0.4em]">Operational Buffer End</span>
</div>
{% endif %}
{% endif %}
