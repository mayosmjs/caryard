# ===================================
#  List Column Definitions
# ===================================

columns:
    id:
        label: ID
        searchable: true

    title:
        label: Title
        searchable: true

    image:
        label: Image
        type: image
        width: 50
        height: 50

    tenant:
        label: Tenant
        relation: tenant
        select: name
        searchable: true

    is_active:
        label: Active
        type: switch

    sort_order:
        label: Order
        type: number

    created_at:
        label: Created At
        type: datetime
