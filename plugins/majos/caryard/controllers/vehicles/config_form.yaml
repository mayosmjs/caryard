# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Vehicle

# Model Form Field configuration
form: $/majos/caryard/models/vehicle/fields.yaml

# Model Class name
modelClass: Majos\Caryard\Models\Vehicle

# Default redirect location
defaultRedirect: majos/caryard/vehicles

# Create page
create:
    title: backend::lang.form.create_title
    redirect: majos/caryard/vehicles/update/:id
    redirectClose: majos/caryard/vehicles

# Update page
update:
    title: backend::lang.form.update_title
    redirect: majos/caryard/vehicles
    redirectClose: majos/caryard/vehicles

# Preview page
preview:
    title: backend::lang.form.preview_title
