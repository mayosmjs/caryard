    redirectClose: majos/caryard/drivetypes

# Update page
update:
    title: backend::lang.form.update_title
    redirect: majos/caryard/drivetypes
    redirectClose: majos/caryard/drivetypes

# Preview page
preview:
    title: backend::lang.form.preview_title
