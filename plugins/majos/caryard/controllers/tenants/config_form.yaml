# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Tenant

# Model Form Field configuration
form: $/majos/caryard/models/tenant/fields.yaml

# Model Class name
modelClass: Majos\Caryard\Models\Tenant

# Default redirect location
defaultRedirect: majos/caryard/tenants

# Create page
create:
    title: backend::lang.form.create_title
    redirect: majos/caryard/tenants/update/:id
    redirectClose: majos/caryard/tenants

# Update page
update:
    title: backend::lang.form.update_title
    redirect: majos/caryard/tenants
    redirectClose: majos/caryard/tenants

# Preview page
preview:
    title: backend::lang.form.preview_title
