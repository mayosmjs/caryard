# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Transmission

# Model Form Field configuration
form: $/majos/caryard/models/transmission/fields.yaml

# Model Class name
modelClass: Majos\Caryard\Models\Transmission

# Default redirect location
defaultRedirect: majos/caryard/transmissions

# Create page
create:
    title: backend::lang.form.create_title
    redirect: majos/caryard/transmissions/update/:id
    redirectClose: majos/caryard/transmissions

# Update page
update:
    title: backend::lang.form.update_title
    redirect: majos/caryard/transmissions
    redirectClose: majos/caryard/transmissions

# Preview page
preview:
    title: backend::lang.form.preview_title
