title = "Register"
layout = "default"
url = "/register"

[session]
security = "guest"
redirect = "home"

[registration]
redirect = "home"
==
<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 mt-16">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Create a new account
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            Already have an account?
            <a href="{{ 'login'|page }}" class="font-medium text-yellow-600 hover:text-yellow-500">
                Log in instead
            </a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
            
            <div data-flash-messages class="mb-4">
                {% flash %}
                    <div class="p-3 rounded {{ type == 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700' }} text-sm text-center">
                        {{ message }}
                    </div>
                {% endflash %}
            </div>

            <form method="post" data-request="registration::onRegister" data-request-validate data-request-flash class="space-y-6">
                <input type="hidden" name="redirect" value="true" />
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="registerFirstName" class="block text-sm font-medium text-gray-700">
                            First Name
                        </label>
                        <div class="mt-1">
                            <input id="registerFirstName" name="first_name" type="text" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm">
                        </div>
                        <span data-validate-for="first_name" class="text-red-500 text-xs mt-1 block"></span>
                    </div>

                    <div>
                        <label for="registerLastName" class="block text-sm font-medium text-gray-700">
                            Last Name
                        </label>
                        <div class="mt-1">
                            <input id="registerLastName" name="last_name" type="text" required
                                class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm">
                        </div>
                        <span data-validate-for="last_name" class="text-red-500 text-xs mt-1 block"></span>
                    </div>
                </div>

                <div>
                    <label for="registerEmail" class="block text-sm font-medium text-gray-700">
                        Email address
                    </label>
                    <div class="mt-1">
                        <input id="registerEmail" name="email" type="email" autocomplete="email" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm">
                    </div>
                    <span data-validate-for="email" class="text-red-500 text-xs mt-1 block"></span>
                </div>

                <div>
                    <label for="registerPassword" class="block text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <div class="mt-1">
                        <input id="registerPassword" name="password" type="password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm">
                    </div>
                    <span data-validate-for="password" class="text-red-500 text-xs mt-1 block"></span>
                </div>

                <div>
                    <label for="registerPasswordConfirm" class="block text-sm font-medium text-gray-700">
                        Confirm Password
                    </label>
                    <div class="mt-1">
                        <input id="registerPasswordConfirm" name="password_confirmation" type="password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm">
                    </div>
                    <span data-validate-for="password_confirmation" class="text-red-500 text-xs mt-1 block"></span>
                </div>

                <div>
                    <button type="submit" data-attach-loading
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-yellow-400 hover:bg-yellow-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 transition disabled:opacity-50">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
